<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="0" />
  <title>Ivy 💕 Will You Be Mine?</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at 50% 50%, #20081a 0%, #0d020a 100%);
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Floating hearts background (glowing SVG vectors) */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .floating-heart {
      position: absolute;
      bottom: -60px;
      pointer-events: none;
      animation: floatUp linear infinite;
      transform-origin: center;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg) scale(0.6); opacity: 0; }
      10%  { opacity: var(--op); }
      90%  { opacity: var(--op); }
      100% { transform: translateY(-115vh) rotate(360deg) scale(1.1); opacity: 0; }
    }

    /* Aurora background particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(circle, rgba(255, 105, 180, 0.15), transparent 70%);
      animation: particleGlow 6s ease-in-out infinite;
    }
    @keyframes particleGlow {
      0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.1; }
      50%       { transform: scale(1.4) translate(20px, -20px); opacity: 0.25; }
    }

    /* Premium glassmorphism card */
    .card {
      position: relative;
      z-index: 10;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 105, 180, 0.07) 100%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 36px;
      padding: 64px 60px 52px;
      text-align: center;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.12);
      max-width: 520px;
      width: 92vw;
      animation: cardPulse 5s ease-in-out infinite;
    }
    @keyframes cardPulse {
      0%, 100% { box-shadow: 0 30px 100px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.12); }
      50%       { box-shadow: 0 40px 120px rgba(255, 20, 147, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.15); }
    }

    /* Luxury badge styled emoji row */
    .emoji-row {
      display: inline-block;
      font-size: 1.25rem;
      padding: 6px 20px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 30px;
      margin-bottom: 28px;
      letter-spacing: 6px;
      text-indent: 6px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      animation: floatBadge 3s ease-in-out infinite;
    }
    @keyframes floatBadge {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }

    /* Serif playfair elegant typography */
    .question-text {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-style: italic;
      font-size: clamp(1.6rem, 5vw, 2.5rem);
      color: #ffffff;
      line-height: 1.4;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .sub-text {
      font-size: 0.78rem;
      color: rgba(255, 182, 193, 0.7);
      margin-bottom: 44px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .buttons {
      display: flex;
      gap: 24px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      position: relative;
    }

    /* Premium YES button with floating pulse */
    .btn-yes {
      padding: 16px 48px;
      font-family: 'Montserrat', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(135deg, #ff4e8a, #ff1a6b);
      color: #fff;
      box-shadow: 0 8px 30px rgba(255, 26, 107, 0.4);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }
    .btn-yes::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.25), transparent);
      border-radius: 50px;
    }
    .btn-yes:hover {
      transform: scale(1.06) translateY(-2px);
      box-shadow: 0 16px 40px rgba(255, 26, 107, 0.6);
    }
    .btn-yes:active { transform: scale(0.96); }

    /* Minimalist luxury NO button */
    .btn-no {
      padding: 15px 44px;
      font-family: 'Montserrat', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 50px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.75);
      position: fixed;
      z-index: 100;
      user-select: none;
      white-space: nowrap;
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }
    .btn-no:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.35);
      color: #ffffff;
    }

    /* Success overlay styling (gorgeous dark overlay) */
    .success-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 50%, #170213 0%, #050005 100%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      padding: 20px;
    }
    .success-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* Elegant framed wrapper for the GIF */
    .success-gif-wrapper {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 80px rgba(255, 20, 147, 0.4), 0 0 120px rgba(0, 0, 0, 0.8);
      transform: scale(0.4) rotate(-6deg);
      opacity: 0;
      transition: transform 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s, opacity 0.8s ease 0.1s;
      max-width: min(400px, 85vw);
    }
    .success-overlay.visible .success-gif-wrapper {
      transform: scale(1) rotate(0deg);
      opacity: 1;
    }
    .success-gif-wrapper img {
      width: 100%;
      display: block;
      border-radius: 28px;
    }

    /* Elegant playfair italic success msg */
    .success-message {
      margin-top: 36px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 600;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      color: #fff;
      text-shadow: 0 4px 20px rgba(255, 105, 180, 0.5);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.5s, transform 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.5s;
      text-align: center;
    }
    .success-overlay.visible .success-message {
      opacity: 1;
      transform: translateY(0);
    }

    .success-sub {
      margin-top: 14px;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      color: rgba(255, 218, 224, 0.9);
      opacity: 0;
      transform: translateY(15px);
      transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.7s, transform 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.7s;
      text-align: center;
      max-width: 500px;
      line-height: 1.5;
    }
    .success-overlay.visible .success-sub {
      opacity: 1;
      transform: translateY(0);
    }

    /* Row of pulsing custom SVG hearts */
    .success-hearts {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.9s ease 0.9s;
    }
    .success-overlay.visible .success-hearts {
      opacity: 1;
    }
    .success-heart-icon {
      width: 22px;
      height: 22px;
      color: #ff4e8a;
      animation: successHeartBeat 1.4s ease-in-out infinite;
    }
    .success-heart-icon:nth-child(2) { animation-delay: 0.2s; }
    .success-heart-icon:nth-child(3) { animation-delay: 0.4s; color: #ff1a6b; }
    .success-heart-icon:nth-child(4) { animation-delay: 0.6s; }
    .success-heart-icon:nth-child(5) { animation-delay: 0.8s; }

    @keyframes successHeartBeat {
      0%, 100% { transform: scale(1); }
      30%       { transform: scale(1.3); }
      60%       { transform: scale(1); }
    }

    .ripple-burst {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,105,180,0.6), transparent);
      pointer-events: none;
      transform: scale(0);
      animation: rippleBurst 0.8s ease-out forwards;
      z-index: 150;
    }
    @keyframes rippleBurst {
      to { transform: scale(20); opacity: 0; }
    }

    .confetti-heart {
      position: fixed;
      pointer-events: none;
      z-index: 160;
      animation: confettiFly 1.2s ease-out forwards;
    }
    @keyframes confettiFly {
      0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(0.3); opacity: 0; }
    }

    @media (max-width: 600px) {
      .card {
        padding: 48px 24px 40px;
        border-radius: 28px;
      }
      .btn-yes {
        padding: 14px 36px;
        font-size: 0.95rem;
      }
      .btn-no {
        padding: 14px 36px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>

  <div class="hearts-bg" id="heartsBg"></div>
  <div id="particleContainer"></div>

  <div class="card" id="mainCard">
    <span class="emoji-row">💌 🌹 💕</span>
    <h1 class="question-text">
      Kya tum meri safar ki<br/>humsafar banogi? 👉👈💕
    </h1>
    <p class="sub-text">~ tere bina sab adhura hai ~</p>

    <div class="buttons" id="buttonsArea">
      <button class="btn-yes" id="btnYes" onclick="onYesClick(event)">
        💗 Yes!
      </button>
    </div>
  </div>

  <button class="btn-no" id="btnNo">No 🤨</button>

  <div class="success-overlay" id="successOverlay">
    <div class="success-gif-wrapper" id="gifWrapper">
      <img src="will-you-be-mine-will-you-be-my-girlfriend.gif" alt="Will you be mine?" />
    </div>
    <p class="success-message">Yay! You said YES! 💖</p>
    <p class="success-sub">chalte phir road trip par Darjeeling ke pahadon par Maggi date par. but dhakaa mat mar dena 🤣</p>
    <div class="success-hearts">
      <svg class="success-heart-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      <svg class="success-heart-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      <svg class="success-heart-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      <svg class="success-heart-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      <svg class="success-heart-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>
  </div>

<script>
  /* ─────────────────────────────────────────
     FLOATING VECTOR HEARTS BACKGROUND
  ──────────────────────────────────────── */
  const bg = document.getElementById('heartsBg');
  function spawnHeart() {
    const el = document.createElement('div');
    el.className = 'floating-heart';
    el.innerHTML = `
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
    `;
    const size = 12 + Math.random() * 24;
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.left = Math.random() * 100 + 'vw';
    
    // Luxury shades of rose, crimson and gold-rose
    const colors = ['#ff4e8a', '#ff1a6b', '#ff758c', '#ffa4b6', '#ff4757'];
    el.style.color = colors[Math.floor(Math.random() * colors.length)];
    
    const op = 0.15 + Math.random() * 0.45;
    el.style.setProperty('--op', op);
    
    const dur  = 6 + Math.random() * 8;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay   = (Math.random() * 4) + 's';
    bg.appendChild(el);
    setTimeout(() => el.remove(), (dur + 4) * 1000);
  }
  for (let i = 0; i < 20; i++) spawnHeart();
  setInterval(spawnHeart, 700);

  /* ─────────────────────────────────────────
     AMBIENT GLOW PARTICLES
  ──────────────────────────────────────── */
  const pc = document.getElementById('particleContainer');
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const sz = 150 + Math.random() * 250;
    p.style.cssText = 'width:' + sz + 'px;height:' + sz + 'px;top:' + (Math.random()*100) + 'vh;left:' + (Math.random()*100) + 'vw;animation-delay:' + (Math.random()*4) + 's;animation-duration:' + (6+Math.random()*6) + 's;position:fixed;z-index:1;';
    pc.appendChild(p);
  }

  /* ─────────────────────────────────────────
     NO BUTTON – DODGE LOGIC
  ──────────────────────────────────────── */
  const btnNo = document.getElementById('btnNo');
  const DODGE_DIST = 150;
  const MARGIN = 20;
  let noX, noY;

  function placeInitial() {
    const w = btnNo.offsetWidth  || 120;
    const h = btnNo.offsetHeight || 48;
    if (window.innerWidth < 600) {
      noX = window.innerWidth / 2 - w / 2;
      noY = window.innerHeight * 0.78 - h / 2;
    } else {
      noX = window.innerWidth  * 0.72 - w / 2;
      noY = window.innerHeight * 0.55 - h / 2;
    }
    btnNo.style.left = noX + 'px';
    btnNo.style.top  = noY + 'px';
  }

  function dodge() {
    const w = btnNo.offsetWidth  || 120;
    const h = btnNo.offsetHeight || 48;
    let pos, attempts = 0;
    const card = document.getElementById('mainCard');
    const cardRect = card ? card.getBoundingClientRect() : null;
    const minDodge = window.innerWidth < 600 ? 100 : 180;
    
    do {
      pos = {
        x: MARGIN + Math.random() * (window.innerWidth  - w - MARGIN * 2),
        y: MARGIN + Math.random() * (window.innerHeight - h - MARGIN * 2)
      };
      attempts++;
      
      const overlapsCard = cardRect && (
        pos.x < cardRect.right + 15 &&
        pos.x + w > cardRect.left - 15 &&
        pos.y < cardRect.bottom + 15 &&
        pos.y + h > cardRect.top - 15
      );
      
      if (!overlapsCard || attempts > 20) {
        if (Math.hypot(pos.x - noX, pos.y - noY) >= minDodge) {
          break;
        }
      }
    } while (attempts < 40);
    
    noX = pos.x; noY = pos.y;
    btnNo.style.transition = 'left 0.22s cubic-bezier(0.34,1.56,0.64,1), top 0.22s cubic-bezier(0.34,1.56,0.64,1)';
    btnNo.style.left = noX + 'px';
    btnNo.style.top  = noY + 'px';
    setTimeout(() => { btnNo.style.transition = 'background 0.2s, color 0.2s, border-color 0.3s'; }, 300);
  }

  placeInitial();
  window.addEventListener('resize', placeInitial);

  document.addEventListener('mousemove', function(e) {
    const rect = btnNo.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;
    if (Math.hypot(e.clientX - cx, e.clientY - cy) < DODGE_DIST) dodge();
  });

  document.addEventListener('touchmove', function(e) {
    const t = e.touches[0];
    const rect = btnNo.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;
    if (Math.hypot(t.clientX - cx, t.clientY - cy) < DODGE_DIST) dodge();
  }, { passive: true });

  btnNo.addEventListener('touchstart', function(e) {
    e.preventDefault();
    dodge();
  });

  btnNo.addEventListener('click', function(e) {
    e.preventDefault();
    dodge();
  });

  /* ─────────────────────────────────────────
     YES BUTTON CLICK
  ──────────────────────────────────────── */
  function onYesClick(e) {
    // Ripple burst from click position
    const rip = document.createElement('div');
    rip.className = 'ripple-burst';
    rip.style.width = '60px'; rip.style.height = '60px';
    rip.style.left = (e.clientX - 30) + 'px';
    rip.style.top  = (e.clientY - 30) + 'px';
    document.body.appendChild(rip);
    setTimeout(() => rip.remove(), 900);

    // Vector confetti hearts burst
    const colors = ['#ff4e8a', '#ff1a6b', '#ff758c', '#ffa4b6', '#ff4757'];
    for (let i = 0; i < 28; i++) {
      const h = document.createElement('div');
      h.className = 'confetti-heart';
      const size = 12 + Math.random() * 12;
      h.style.width = size + 'px';
      h.style.height = size + 'px';
      h.style.color = colors[Math.floor(Math.random() * colors.length)];
      h.innerHTML = `
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      `;
      const angle = (i / 28) * 360;
      const dist  = 120 + Math.random() * 200;
      const tx = Math.cos(angle * Math.PI / 180) * dist;
      const ty = Math.sin(angle * Math.PI / 180) * dist;
      const rot = (Math.random() * 720 - 360);
      h.style.left = e.clientX + 'px';
      h.style.top  = e.clientY + 'px';
      h.style.setProperty('--tx', tx + 'px');
      h.style.setProperty('--ty', ty + 'px');
      h.style.setProperty('--rot', rot + 'deg');
      h.style.animationDelay    = (Math.random() * 0.15) + 's';
      h.style.animationDuration = (0.9 + Math.random() * 0.5) + 's';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1800);
    }

    setTimeout(function() {
      document.getElementById('successOverlay').classList.add('visible');
    }, 300);

    btnNo.style.display = 'none';
  }
</script>
</body>
</html>
